name: hybrid-dev
services:
  neo4j-hybrid:
    image: neo4j:5.25-community
    container_name: neo4j-hybrid-dev
    ports:
      - "7476:7474"  # HTTP
      - "7689:7687"  # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_hybrid_data_dev:/data
      - neo4j_hybrid_logs_dev:/logs
    networks:
      - graphrag_hybrid_network_dev

  pgvector-hybrid:
    image: pgvector/pgvector:0.6.2-pg16
    container_name: pgvector-hybrid-dev
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-graphrag}
    volumes:
      - pgvector_hybrid_data_dev:/var/lib/postgresql/data
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - graphrag_hybrid_network_dev

  jupyter-hybrid:
    build:
      context: ./jupyter
      dockerfile: Dockerfile.dev
    container_name: jupyter-hybrid-dev
    ports:
      - "8890:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
    volumes:
      - ../notebooks:/home/jovyan/notebooks
      - ../../../lexical-graph:/home/jovyan/lexical-graph-src
      - ../../../lexical-graph-contrib:/home/jovyan/lexical-graph-contrib
      - ~/.aws:/home/jovyan/.aws
    networks:
      - graphrag_hybrid_network_dev
    depends_on:
      - pgvector-hybrid
      - neo4j-hybrid
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password='' --NotebookApp.disable_check_xsrf=True

networks:
  graphrag_hybrid_network_dev:
    driver: bridge

volumes:
  neo4j_hybrid_data_dev:
  neo4j_hybrid_logs_dev:
  pgvector_hybrid_data_dev:
